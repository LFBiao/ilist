# ========================
# 主要端口设置
# ========================
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895

allow-lan: true
mode: rule
log-level: info

external-controller: 0.0.0.0:9090
external-ui: ui
external-ui-name: zashboard
external-ui-url: https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip
secret: "123456"

# ========================
# DNS 设置（已优化，加快首次访问速度）
# ========================
dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: true
  use-hosts: true

  # 全局默认 nameserver（优先国内快速 DNS）
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - 223.5.5.5
    - 223.6.6.6

  # 直连模式下的 DNS（国内网站优先走这里）
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - 223.5.5.5
    - 223.6.6.6

  # 代理模式下的 DNS（国外网站走这里）
  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  # 兜底 DNS
  default-nameserver:
    - 223.5.5.5
    - 223.6.6.6

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "+.market.xiaomi.com"
    - "+.mi.com"
    - "time.*.com"
    - "ntp.*.com"
    
  # 域名策略：让国内常用网站强制走国内 DNS，加快首次解析
  nameserver-policy:
    'geosite:cn': https://dns.alidns.com/dns-query
    '+.baidu.com': https://dns.alidns.com/dns-query
    '+.douyin.com': https://dns.alidns.com/dns-query
    '+.ixigua.com': https://dns.alidns.com/dns-query
    '+.bilibili.com': https://dns.alidns.com/dns-query
    '+.taobao.com': https://dns.alidns.com/dns-query
    '+.jd.com': https://dns.alidns.com/dns-query
    '+.163.com': https://dns.alidns.com/dns-query
    '+.qq.com': https://dns.alidns.com/dns-query

# ========================
# TUN 模块
# ========================
tun:
  enable: true
  stack: mixed
  device: utun
  endpoint-independent-nat: true
  auto-route: false
  auto-detect-interface: false
  auto-redirect: false
  strict-route: false

profile:
  store-selected: true
  store-fake-ip: true

# ========================
# 策略组定义
# ========================
pr: &pr {type: select, proxies: [🚀 默认代理, 🚀 AI屏蔽, ♻️ 全部自动, ♻️ 香港自动, ♻️ 台湾自动, ♻️ 日本自动, ♻️ 美国自动, ♻️ 优质自动, ♻️ 自建自动, 直连]}

proxy-groups:
  - {name: 🚀 默认代理, type: select, proxies: [♻️ 全部自动, ♻️ 香港自动, ♻️ 台湾自动, ♻️ 日本自动, ♻️ 美国自动, ♻️ 优质自动, ♻️ 自建自动, 直连]}
  - {name: 🚀 AI屏蔽, type: select, proxies: [♻️ 全部自动, ♻️ 香港自动, ♻️ 台湾自动, ♻️ 日本自动, ♻️ 美国自动, ♻️ 优质自动, ♻️ 自建自动, 直连]}
  - {name: YouTube, <<: *pr}
  - {name: Google, <<: *pr}
  - {name: TikTok, <<: *pr}
  - {name: GitHub, <<: *pr}
  - {name: ChatGPT, <<: *pr}
  - {name: Meta AI, <<: *pr}
  - {name: Claude, <<: *pr}
  - {name: Perplexity, <<: *pr}
  - {name: Telegram, <<: *pr}
  - {name: Twitter(X), <<: *pr}
  - {name: WhatsApp, <<: *pr}
  - {name: Facebook, <<: *pr}
  - {name: Steam, <<: *pr}
  - {name: Game, <<: *pr}
  - {name: Disney, <<: *pr}
  - {name: Netflix, <<: *pr}
  - {name: HBO, <<: *pr}
  - {name: Spotify, <<: *pr}
  - {name: Crypto, <<: *pr}
  - {name: Amazon, <<: *pr}
  - {name: Apple, <<: *pr}
  - {name: Microsoft, <<: *pr}
  - {name: Test, <<: *pr}
  - {name: 国外, <<: *pr}
  - {name: 国内, <<: *pr}
  - {name: 其他, <<: *pr}

  - {name: ♻️ 香港自动, type: url-test, include-all: true, tolerance: 50, interval: 300, filter: "(?=.*(港|HK|(?i)Hong))^(?!.*(台|日|韩|新|深|美)).*$"}
  - {name: ♻️ 台湾自动, type: url-test, include-all: true, tolerance: 50, interval: 300, filter: "(?=.*(台|ZJ|TW|(?i)Taiwan))^(?!.*(港|韩|新|美)).*$"}
  - {name: ♻️ 日本自动, type: url-test, include-all: true, tolerance: 50, interval: 300, filter: "(?=.*(日|ZJ|JP|(?i)Japan))^(?!.*(港|台|韩|新|美)).*$"}
  - {name: ♻️ 美国自动, type: url-test, include-all: true, tolerance: 50, interval: 300, filter: "(?=.*(美|US|ZJ|CF|(?i)States|America))^(?!.*(港|台|日|韩|新)).*$"}
  - {name: ♻️ 优质自动, type: url-test, include-all: true, tolerance: 50, interval: 300, filter: "(?=.*(20倍|ZJ|大王|DaWang|猫耳)).*$"}
  - {name: ♻️ 自建自动, type: url-test, include-all: true, tolerance: 50, interval: 300, filter: "(?=.*(自建|ZJ)).*$"}
  - {name: ♻️ 全部自动, type: url-test, include-all: true, tolerance: 50, interval: 300, filter: "^(?!.*(直连)).*$"}

